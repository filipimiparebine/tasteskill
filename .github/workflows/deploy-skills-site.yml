name: Deploy Skills Atlas

on:
  push:
    branches: [main]
    paths:
      - "docs/skills-site/**"
      - ".github/workflows/deploy-skills-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/skills-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/skills-site/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Project Pages serve at https://<user>.github.io/<repo>/
          SITE_BASE: /tasteskill
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/skills-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
